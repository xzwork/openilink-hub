name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing v* tag to publish; leave empty for an artifact-only test build"
        required: false
        type: string

permissions:
  contents: write

jobs:
  frontend:
    name: Build frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288 # v5
        with:
          version: 10.32.1
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - working-directory: web
        run: pnpm install --frozen-lockfile
      - working-directory: web
        run: pnpm run build
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: frontend-dist
          path: internal/web/dist/
          retention-days: 1

  binaries:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-24.04
          - goos: darwin
            goarch: amd64
            runner: macos-15-intel
          - goos: darwin
            goarch: arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: frontend-dist
          path: internal/web/dist/
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          version="snapshot"
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          elif [[ -n "${MANUAL_RELEASE_TAG}" ]]; then
            version="${MANUAL_RELEASE_TAG#v}"
          fi
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build \
            -ldflags "-s -w -X main.version=${version} -X main.commit=${GITHUB_SHA::7} -X main.date=${build_date}" \
            -o oih .
          tar -czf "openilink-hub_${version}_${GOOS}_${GOARCH}.tar.gz" oih
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: openilink-hub-${{ matrix.goos }}-${{ matrix.goarch }}
          path: openilink-hub_*.tar.gz

  release:
    name: Publish GitHub Release
    if: github.ref_type == 'tag' || inputs.release_tag != ''
    needs: binaries
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: openilink-hub-*
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: sha256sum openilink-hub_*.tar.gz > checksums.txt
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          release_tag="${GITHUB_REF_NAME}"
          if [[ -n "${MANUAL_RELEASE_TAG}" ]]; then release_tag="${MANUAL_RELEASE_TAG}"; fi
          if [[ "${release_tag}" != v* ]]; then
            echo "release_tag must start with v" >&2
            exit 1
          fi
          if gh release view "${release_tag}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" dist/* --clobber
          else
            gh release create "${release_tag}" dist/* \
              --verify-tag \
              --title "${release_tag}" \
              --generate-notes
          fi
